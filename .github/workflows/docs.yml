name: Deploy VitePress Documentation

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - ".github/workflows/docs.yml"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ${{ contains(github.server_url, 'github') && 'ubuntu-latest' || 'codeberg-small' }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          cd docs
          npm install

      - name: Build documentation
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cd docs
          npm run docs:build

      - name: Deploy to Pages Branch
        run: |
          cd docs/.vitepress/dist
          git init
          if [[ "${{ github.server_url }}" == *github* ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
          else
            git config user.name "Codeberg Actions"
            git config user.email "actions@codeberg.org"
          fi
          git checkout -b pages
          git add .
          git commit -m "Deploy docs (build #${{ github.run_number }})"
          if [[ "${{ github.server_url }}" == *github* ]]; then
            git push -f "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" pages
          else
            git push -f "https://${{ github.repository_owner }}:${{ secrets.CODEBERG_TOKEN }}@codeberg.org/${{ github.repository }}.git" pages
          fi
